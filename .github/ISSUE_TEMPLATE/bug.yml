
name: 🐛 Bug
description: 不具合報告（必須項目あり）

labels: ["bug", "type:bug"]

body:
  - type: markdown
    attributes:
      value: |
        ❗ 不具合再現・修正のため、必須項目は必ず記入してください。

  - type: textarea
    attributes:
      label: 手順
      description: 不具合が発生するまでの手順を記載してください
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 発生現象
      description: 実際に発生している問題/発生頻度を記載してください
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期待動作
      description: 本来期待される動作を記載してください
    validations:
      required: true

  - type: textarea
    attributes:
      label: 確認環境
      description: |
        検証を行った環境を記載してください。

        例 :
        - FW version/commit : V0020 (aba6626a)
        - 使用基板 : ES1 (Lch No.1, Rch No.2)
        - 使用端末 : Pixel 6 (Android ver.16)

      value: |
        - FW version/commit：
        - 使用基板：
        - 使用端末：
    validations:
      required: true

  - type: textarea
    attributes:
      label: 補足
      description: 他機種・他環境での発生有無やログ、スクリーンショット、その他情報があれば記載してください
    validations:
      required: false
